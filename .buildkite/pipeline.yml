---
agents:
  queue: mac

steps:
  - key: bazel-test-xml-bug-repro
    label: ":bazel: Test XML bug repro"
    command: |
      set -eu
      rm -rf testlogs
      bazel clean
      bazel test --config=ci //...
      mkdir -p testlogs
      cp -rL bazel-testlogs/* testlogs/ || true
      echo "--- XML files found:"
      find testlogs/ -name "test.xml" | sort
      count="$(find testlogs/ -name 'test.xml' | wc -l | xargs)"
      echo "Total: ${count} test.xml files"
      if [ "${count}" -ne 4 ]; then
        echo "FAIL: Expected 4 test.xml files, got ${count}"
        exit 1
      fi
    secrets:
      BUILDKITE_ANALYTICS_TOKEN: ANALYTICS_TOKEN
    plugins:
      - github.com/buildkite-plugins/test-collector-buildkite-plugin#v1.10.2:
          files: "**/test*.xml"
          format: junit
          base-path: testlogs
          missing-error: 0
          follow-symlinks: true
          upload-concurrency: 50
